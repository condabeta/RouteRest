<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a4a78"/>
      <stop offset="1" stop-color="#0e1c33"/>
    </linearGradient>
    <pattern id="plaid" width="38" height="38" patternUnits="userSpaceOnUse">
      <rect width="38" height="38" fill="#c0392b"/>
      <rect x="0" width="7" height="38" fill="#e05646" opacity="0.7"/>
      <rect y="0" width="38" height="7" fill="#e05646" opacity="0.7"/>
      <rect x="19" width="3" height="38" fill="#ffffff" opacity="0.45"/>
      <rect y="19" width="38" height="3" fill="#ffffff" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="320" height="400" fill="url(#bg)"/>
  <circle cx="160" cy="172" r="128" fill="#ffffff" opacity="0.06"/>

  <!-- shoulders / plaid shirt -->
  <path d="M26 400 V340 C26 292 90 266 160 266 C230 266 294 292 294 340 V400 Z" fill="url(#plaid)"/>
  <!-- undershirt -->
  <path d="M133 268 L160 304 L187 268 Z" fill="#e8edf3"/>

  <!-- neck -->
  <path d="M138 232 h44 v34 c0 16 -44 16 -44 0 Z" fill="#e0a87f"/>
  <path d="M138 252 q22 16 44 0 v8 q-22 14 -44 0 Z" fill="#000000" opacity="0.08"/>

  <!-- ears -->
  <circle cx="99" cy="186" r="13" fill="#e9b189"/>
  <circle cx="221" cy="186" r="13" fill="#e9b189"/>

  <!-- head -->
  <ellipse cx="160" cy="178" rx="64" ry="70" fill="#f0c49f"/>

  <!-- beard / stubble -->
  <path d="M99 184 C104 248 138 270 160 270 C182 270 216 248 221 184 C214 214 196 232 160 232 C124 232 106 214 99 184 Z" fill="#5c4029" opacity="0.85"/>

  <!-- nose -->
  <path d="M159 186 q-6 16 -2 22 q5 4 11 1" stroke="#cf9a72" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- smile -->
  <path d="M141 221 Q160 236 179 221" stroke="#7a4b32" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- sunglasses -->
  <g>
    <rect x="103" y="166" width="50" height="31" rx="11" fill="#11151d"/>
    <rect x="167" y="166" width="50" height="31" rx="11" fill="#11151d"/>
    <rect x="150" y="175" width="20" height="6" rx="3" fill="#11151d"/>
    <rect x="90" y="172" width="15" height="6" rx="3" fill="#11151d"/>
    <rect x="215" y="172" width="15" height="6" rx="3" fill="#11151d"/>
    <rect x="110" y="172" width="16" height="6" rx="3" fill="#ffffff" opacity="0.22"/>
    <rect x="174" y="172" width="16" height="6" rx="3" fill="#ffffff" opacity="0.22"/>
  </g>

  <!-- cap -->
  <path d="M92 150 C96 102 128 78 160 78 C192 78 224 102 228 150 C200 130 120 130 92 150 Z" fill="#1b3a64"/>
  <path d="M88 150 C120 138 200 138 232 150 L232 159 C200 147 120 147 88 159 Z" fill="#15294a"/>
  <path d="M82 159 C120 150 200 150 238 159 C240 172 120 180 82 171 Z" fill="#12233d"/>
  <!-- cap stars (Americana accent) -->
  <g fill="#ffffff">
    <circle cx="140" cy="116" r="4"/>
    <circle cx="160" cy="110" r="4"/>
    <circle cx="180" cy="116" r="4"/>
  </g>
</svg>
